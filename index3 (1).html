<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Detect - New Labeling UI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f5;padding:12px;font-size:14px}
.wrap{max-width:100%;background:#fff;border:0.5px solid #ccc;border-radius:12px;overflow:hidden}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none;border-bottom:0.5px solid #e0e0e0;background:#fff;font-size:14px;font-weight:500;color:#333}
.acc-header:hover{background:#f9f9f9}
.acc-header.open{background:#2e7d32;color:#fff}
.acc-arrow{font-size:11px;transition:transform .2s}
.acc-header.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:14px 18px;border-bottom:0.5px solid #e0e0e0}
.acc-body.open{display:block}
.sub-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#bbb;margin:16px 0 8px 2px;padding-bottom:4px;border-bottom:0.5px solid #eee}
.sub-title.first{margin-top:4px}
.sub-shared{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#2e7d32;margin-top:4px;margin-bottom:8px;margin-left:2px;padding-bottom:4px;border-bottom:0.5px solid #c8e6c9}
.sec{margin-bottom:4px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:4px;font-size:13px;cursor:pointer;user-select:none}
.row:nth-child(even){background:#f9f9f9}
.row:hover{background:#e8f5e9}
.row label{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;color:#111}
.row input{accent-color:#2e7d32;width:15px;height:15px;cursor:pointer;flex-shrink:0}
.code{font-family:monospace;font-size:11px;text-decoration:underline;color:#888;white-space:nowrap}
.hint{font-size:11px;color:#aaa;font-style:italic;padding:2px 10px 5px 33px;display:none}
.statusbar{padding:9px 16px;font-size:12px;color:#666;background:#f5f5f5;border-top:0.5px solid #ddd}
</style>
</head>
<body>
<div class="wrap">
  <div id="accordion"></div>
  <div class="statusbar" id="status">No attributes selected</div>
</div>
<script>
var B = {"General": {"Lot type": [{"l": "Abandoned", "c": "LTA"}, {"l": "Construction", "c": "LTCON"}, {"l": "Multifamily", "c": "LTM"}, {"l": "Not residential", "c": "LTNR"}, {"l": "Vacant", "c": "LTV"}], "Bad picture": [{"l": "Bad angle", "c": "BPA"}, {"l": "Blocked", "c": "BPB"}, {"l": "Cloudy", "c": "BPC"}, {"l": "Wrong parcel", "c": "BPWP"}]}, "Grounds and Pavement": {"Shared": [{"l": "Leaves", "c": "LALE", "h": "was: Leaves - lawn, sidewalk, driveway, stairs merged"}, {"l": "Litter / Debris", "c": "LALD", "h": "was: Debris and Litter - lawn, sidewalk, driveway merged"}], "Pavement": [{"l": "Cracked Driveway", "c": "DRC", "h": "was: Cracked (DRC)"}, {"l": "Overgrown Pavement", "c": "SIOP", "h": "was: Overgrown sidewalk, driveway, stairs"}, {"l": "Cracked Sidewalk", "c": "SIC", "h": "was: Cracked (SIC)"}], "Grounds": [{"l": "Lawn Branches", "c": "LABR", "h": "was: Branches (LABR)"}, {"l": "Lawn Dead Patch", "c": "LADP", "h": "was: Dead patch (LADP)"}, {"l": "Overgrown Lawn", "c": "OLA", "h": "was: Overgrown weeds (LAO)"}, {"l": "Lawn Vehicle", "c": "LAV", "h": "was: Vehicle (LAV)"}]}, "Structures and Exterior": {"Structures": [{"l": "Fence Paint", "c": "FEP", "h": "was: Paint rust (FEP)"}, {"l": "Fence Damage", "c": "FEDA", "h": "was: Structural (FES)"}, {"l": "Overgrown Structures", "c": "GAOS", "h": "was: Overgrown garage, porch, wall, roof, railing, gutter"}, {"l": "Retaining Wall Damage", "c": "REDA", "h": "was: Structural (RES)"}, {"l": "Yard Structure Overgrown", "c": "REYSO", "h": "was: Overgrown fence and retaining wall"}], "Exterior": [{"l": "Stair Damage", "c": "STDA", "h": "was: Structural stairs and railing"}, {"l": "Structure Paint", "c": "GASP", "h": "was: Paint rust on garage, porch, awning, column, wall, foundation, vent, door, shutter, window, chimney, fascia, soffit, railing, stairs"}, {"l": "Wall Structural Damage", "c": "WASDA", "h": "was: Structural (WAS)"}, {"l": "Foundation Damage", "c": "FODA", "h": "was: Structural (FOS)"}]}, "Porch and Openings": {"Porch": [{"l": "Porch Debris", "c": "POD", "h": "was: Debris (POD)"}, {"l": "Porch Damage", "c": "PODA", "h": "was: Structural and Screen merged"}, {"l": "Awning Damage", "c": "AWDA", "h": "was: Structural (AWS)"}, {"l": "Column Damage", "c": "COLDA", "h": "was: Structural (COLS)"}, {"l": "Garage Damage", "c": "GADA", "h": "was: Structural (GAS)"}], "Doors and Windows": [{"l": "Broken Window", "c": "WIB", "h": "was: Broken (WIB)"}, {"l": "Window Plywood", "c": "WIPL", "h": "was: Plywood (WIPL)"}, {"l": "Door Plywood", "c": "DOPL", "h": "was: Plywood (DOPL)"}, {"l": "Broken Door", "c": "DOB", "h": "was: Broken (DOB)"}]}, "Roof": {"Roof": [{"l": "Chimney Damage", "c": "CHDA", "h": "was: Structural (CHS)"}, {"l": "Roof Leaves", "c": "ROL", "h": "was: Leaves (ROL)"}, {"l": "Roof Damage", "c": "RODA", "h": "was: Structural (ROS)"}, {"l": "Roof Tarp", "c": "ROT", "h": "was: Tarp (ROT)"}, {"l": "Fascia Damage", "c": "FADA", "h": "was: Structural fascia, soffit, gutter"}]}};
var NAV = ["General", "Grounds and Pavement", "Structures and Exterior", "Porch and Openings", "Roof"];
var ND = {"General": "General", "Grounds and Pavement": "Grounds & Pavement", "Structures and Exterior": "Structures & Exterior", "Porch and Openings": "Porch & Openings", "Roof": "Roof"};
var checked = {};
var openBlock = "General";

function buildAccordion(){
  var acc = document.getElementById("accordion");
  acc.innerHTML = "";
  for(var i=0;i<NAV.length;i++){
    var k = NAV[i];
    var isOpen = openBlock === k;

    var header = document.createElement("div");
    header.className = "acc-header" + (isOpen ? " open" : "");
    header.innerHTML = ND[k] + '<span class="acc-arrow">' + (isOpen ? "▲" : "▼") + "</span>";
    header.onclick = (function(key){ return function(){ toggle_block(key); }; })(k);

    var body = document.createElement("div");
    body.className = "acc-body" + (isOpen ? " open" : "");
    body.id = "body_" + k.replace(/ /g,"_");

    if(isOpen) buildBody(body, k);

    acc.appendChild(header);
    acc.appendChild(body);
  }
}

function buildBody(container, blockKey){
  var secs = B[blockKey];
  var secKeys = Object.keys(secs);
  var html = "";
  for(var s=0;s<secKeys.length;s++){
    var sec = secKeys[s];
    var items = secs[sec];
    if(secKeys.length > 1){
      var isShared = sec === "Shared";
      var cls = isShared ? "sub-shared" : ("sub-title" + (s===0?" first":""));
      html += '<div class="' + cls + '">' + sec + '</div>';
    }
    html += '<div class="sec">';
    for(var i=0;i<items.length;i++){
      var item = items[i];
      var id = "cb_" + blockKey.replace(/ /g,"_") + "_" + s + "_" + i;
      var key = blockKey + "||" + sec + "||" + item.l;
      var chk = checked[key] ? "checked" : "";
      html += '<div class="row" id="row_' + id + '">';
      html += '<label for="' + id + '"><input type="checkbox" id="' + id + '" ' + chk + '>' + item.l + '</label>';
      html += '<span class="code">' + item.c + '</span></div>';
      if(item.h){
        html += '<div class="hint" id="hint_' + id + '"' + (checked[key]?' style="display:block"':'') + '>' + item.h + '</div>';
      }
    }
    html += '</div>';
  }
  container.innerHTML = html;

  for(var s=0;s<secKeys.length;s++){
    var sec = secKeys[s];
    var items = secs[sec];
    for(var i=0;i<items.length;i++){
      (function(sec, item, s, i){
        var id = "cb_" + blockKey.replace(/ /g,"_") + "_" + s + "_" + i;
        var key = blockKey + "||" + sec + "||" + item.l;
        var row = document.getElementById("row_" + id);
        var cb = document.getElementById(id);
        if(row) row.addEventListener("click", function(e){
          if(e.target.tagName === "INPUT") return;
          doToggle(key, id, cb);
        });
        if(cb) cb.addEventListener("click", function(e){
          e.stopPropagation();
          doToggle(key, id, cb);
        });
      })(sec, items[i], s, i);
    }
  }
}

function toggle_block(k){
  if(openBlock === k){
    openBlock = null;
  } else {
    openBlock = k;
  }
  buildAccordion();
}

function doToggle(key, id, cb){
  if(checked[key]){ delete checked[key]; if(cb) cb.checked = false; }
  else { checked[key] = true; if(cb) cb.checked = true; }
  var hint = document.getElementById("hint_" + id);
  if(hint) hint.style.display = checked[key] ? "block" : "none";
  updateStatus();
}

function updateStatus(){
  var keys = Object.keys(checked);
  var n = keys.length;
  if(n === 0){
    document.getElementById("status").innerHTML = "No attributes selected";
  } else {
    var names = keys.map(function(k){ return k.split("||")[2]; }).join(", ");
    document.getElementById("status").innerHTML = '<span style="color:#2e7d32;font-weight:500">' + n + ' attribute' + (n>1?'s':'') + ' selected</span>: ' + names;
  }
}

buildAccordion();
</script>
</body>
</html>
