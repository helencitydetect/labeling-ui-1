<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Detect - New Labeling UI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f5;padding:12px;font-size:14px}
.wrap{max-width:100%;background:#fff;border:0.5px solid #ccc;border-radius:12px;overflow:hidden}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none;border-bottom:0.5px solid #e0e0e0;background:#fff;font-size:14px;font-weight:500;color:#333}
.acc-header:hover{background:#f9f9f9}
.acc-header.open{background:#2e7d32;color:#fff}
.acc-arrow{font-size:11px;transition:transform .2s}
.acc-header.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:14px 18px;border-bottom:0.5px solid #e0e0e0}
.acc-body.open{display:block}
.sub-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#bbb;margin:16px 0 8px 2px;padding-bottom:4px;border-bottom:0.5px solid #eee}
.sub-title.first{margin-top:4px}
.sub-shared{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#2e7d32;margin-top:4px;margin-bottom:8px;margin-left:2px;padding-bottom:4px;border-bottom:0.5px solid #c8e6c9}
.sec{margin-bottom:4px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:4px;font-size:13px;cursor:pointer;user-select:none;position:relative}
.row:nth-child(even){background:#f9f9f9}
.row:hover{background:#e8f5e9}
.row label{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;color:#111}
.row input{accent-color:#2e7d32;width:15px;height:15px;cursor:pointer;flex-shrink:0}
.code{font-family:monospace;font-size:11px;color:#888;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.hint{font-size:11px;color:#aaa;font-style:italic;padding:2px 10px 5px 33px;display:none}
.tooltip{display:none;position:absolute;left:36px;top:calc(100% + 4px);background:#2c2c2a;color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;white-space:nowrap;z-index:100;pointer-events:none;line-height:1.4}
.row:hover .tooltip{display:block}
.statusbar{padding:9px 16px;font-size:12px;color:#666;background:#f5f5f5;border-top:0.5px solid #ddd}
</style>
</head>
<body>
<div class="wrap">
  <div id="accordion"></div>
  <div class="statusbar" id="status">No attributes selected</div>
</div>
<script>
var B = {"General": {"Lot type": [{"l": "Abandoned", "c": "LTA"}, {"l": "Construction", "c": "LTCON"}, {"l": "Multifamily", "c": "LTM"}, {"l": "Not residential", "c": "LTNR"}, {"l": "Vacant", "c": "LTV"}], "Bad picture": [{"l": "Bad angle", "c": "BPA"}, {"l": "Blocked", "c": "BPB"}, {"l": "Cloudy", "c": "BPC"}, {"l": "Wrong parcel", "c": "BPWP"}]}, "Grounds and Pavement": {"Shared": [{"l": "Leaves", "c": "LALE, SILE, DRLE, STLE, GPLE", "h": "was: Leaves — lawn (LALE), sidewalk (SILE), driveway (DRLE), stairs (STLE), GPLE"}, {"l": "Litter / Debris", "c": "LADE, LALI, SID, SILI, DRLI, DRD, GPLD", "h": "was: Debris+Litter — lawn (LADE/LALI), sidewalk (SID/SILI), driveway (DRD/DRLI)"}], "Pavement": [{"l": "Cracked Driveway", "c": "DRC", "h": "was: Driveway Cracked (DRC)"}, {"l": "Overgrown Pavement", "c": "SIO, DRO, STO, OGP", "h": "was: Overgrown — sidewalk (SIO), driveway (DRO), stairs (STO)"}, {"l": "Cracked Sidewalk", "c": "SIC", "h": "was: Sidewalk Cracked (SIC)"}], "Grounds": [{"l": "Lawn Branches", "c": "LABR", "h": "was: Lawn Branches (LABR)"}, {"l": "Lawn Dead Patch", "c": "LADP", "h": "was: Lawn Dead patch (LADP)"}, {"l": "Overgrown Lawn", "c": "LAO, LAG, OGL", "h": "was: Overgrown weeds (LAO) + Grass height (LAG)"}, {"l": "Lawn Vehicle", "c": "LAV", "h": "was: Lawn Vehicle (LAV)"}]}, "Yard Structures": {"Structures": [{"l": "Fence Paint", "c": "FEP", "h": "was: Fence Paint rust (FEP)"}, {"l": "Fence Damage", "c": "FES, FEDA", "h": "was: Fence Structural (FES)"}, {"l": "Structure Paint", "c": "GAP, POPA, AWP, COLP, RAP, WAP, FOP, VEP, DOPA, SHP, WIPA, CHP, SOP, FAP, STP", "h": "was: Paint rust — garage (GAP), porch (POPA), awning (AWP), column (COLP), railing (RAP), wall (WAP), foundation (FOP), vent (VEP), door (DOPA), shutter (SHP), window (WIPA), chimney (CHP), soffit (SOP), fascia (FAP)"}, {"l": "Overgrown Structures", "c": "GAO, POO, RAO, WAO, ROO, GUO, OGS", "h": "was: Overgrown — garage (GAO), porch (POO), railing (RAO), wall (WAO), roof (ROO), gutter (GUO)"}, {"l": "Yard Structure Overgrown", "c": "REO, FEO, YSO", "h": "was: Overgrown retaining wall (REO) + fence (FEO)"}, {"l": "Retaining Wall Damage", "c": "RES, REDA", "h": "was: Retaining wall Structural (RES)"}, {"l": "Stair Damage", "c": "STS, RAS, STDA", "h": "was: Stairs Structural (STS) + Railing Structural (RAS)"}]}, "Main Structures": {"Structures": [{"l": "Porch Debris", "c": "POD", "h": "was: Porch Debris (POD)"}, {"l": "Porch Damage", "c": "POST, POSC, PODA", "h": "was: Porch Structural (POST) + Screen (POSC)"}, {"l": "Awning Damage", "c": "AWS, AWDA", "h": "was: Awning Structural (AWS)"}, {"l": "Column Damage", "c": "COLS, COLDA", "h": "was: Column Structural (COLS)"}, {"l": "Garage Damage", "c": "GAS, GADA", "h": "was: Garage Structural (GAS)"}, {"l": "Wall Structural Damage", "c": "WAS, WSDA", "h": "was: Wall Structural (WAS)"}, {"l": "Foundation Damage", "c": "FOS, FODA", "h": "was: Foundation Structural (FOS)"}], "Doors and Windows": [{"l": "Broken Window", "c": "WIB", "h": "was: Window Broken (WIB) + Missing (WIMI)"}, {"l": "Window Plywood", "c": "WIPL", "h": "was: Window Plywood (WIPL)"}, {"l": "Door Plywood", "c": "DOPL", "h": "was: Door Plywood (DOPL)"}, {"l": "Broken Door", "c": "DOB", "h": "was: Door Broken (DOB) + Missing (DOMI)"}]}, "Roof": {"Roof": [{"l": "Chimney Damage", "c": "CHS, CHDA", "h": "was: Chimney Structural (CHS)"}, {"l": "Roof Leaves", "c": "ROL", "h": "was: Roof Leaves (ROL)"}, {"l": "Roof Damage", "c": "ROS, RODA", "h": "was: Roof Structural (ROS)"}, {"l": "Roof Tarp", "c": "ROT", "h": "was: Roof Tarp (ROT)"}, {"l": "Fascia Damage", "c": "SOS, FAS, GUS, FADA", "h": "was: Fascia Structural (FAS) + Soffit Structural (SOS) + Gutter Structural (GUS)"}]}};
var NAV = ["General", "Grounds and Pavement", "Yard Structures", "Main Structures", "Roof"];
var ND = {"General": "General", "Grounds and Pavement": "Grounds & Pavement", "Yard Structures": "Yard Structures", "Main Structures": "Main Structures", "Roof": "Roof"};
var TT = {"Lawn Branches": "Zones: lawn", "Broken Window": "Zones: window", "Cracked Sidewalk": "Zones: sidewalk", "Fence Damage": "Zones: fence", "Stair Damage": "Zones: stairs, railing", "Fence Paint": "Zones: fence", "Lawn Dead Patch": "Zones: lawn", "Lawn Vehicle": "Zones: lawn", "Leaves": "Zones: lawn, sidewalk, driveway, stairs", "Litter / Debris": "Zones: lawn, sidewalk, driveway", "Overgrown Structures": "Zones: garage, porch, wall, railing, roof, gutter", "Overgrown Lawn": "Zones: lawn", "Overgrown Pavement": "Zones: sidewalk, driveway, stairs", "Window Plywood": "Zones: window", "Door Plywood": "Zones: door", "Roof Damage": "Zones: roof", "Roof Leaves": "Zones: roof", "Roof Tarp": "Zones: roof", "Structure Paint": "Zones: garage, porch, awning, column, railing, wall, foundation, vent, door, shutter, window, chimney, soffit, fascia", "Wall Structural Damage": "Zones: wall", "Broken Door": "Zones: door", "Retaining Wall Damage": "Zones: retaining wall", "Yard Structure Overgrown": "Zones: retaining wall, fence", "Porch Debris": "Zones: porch", "Garage Damage": "Zones: garage", "Porch Damage": "Zones: porch", "Fascia Damage": "Zones: fascia, soffit, gutter", "Foundation Damage": "Zones: foundation", "Awning Damage": "Zones: awning", "Chimney Damage": "Zones: chimney", "Column Damage": "Zones: column", "Cracked Driveway": "Zones: driveway"};
var checked = {};
var openBlock = "General";

function buildAccordion(){
  var acc = document.getElementById("accordion");
  acc.innerHTML = "";
  for(var i=0;i<NAV.length;i++){
    var k = NAV[i];
    var isOpen = openBlock === k;
    var header = document.createElement("div");
    header.className = "acc-header" + (isOpen ? " open" : "");
    header.innerHTML = ND[k] + '<span class="acc-arrow">' + (isOpen ? "▲" : "▼") + "</span>";
    header.onclick = (function(key){ return function(){ toggleBlock(key); }; })(k);
    var body = document.createElement("div");
    body.className = "acc-body" + (isOpen ? " open" : "");
    body.id = "body_" + k.replace(/ /g,"_");
    if(isOpen) buildBody(body, k);
    acc.appendChild(header);
    acc.appendChild(body);
  }
}

function buildBody(container, blockKey){
  var secs = B[blockKey];
  var secKeys = Object.keys(secs);
  var html = "";
  for(var s=0;s<secKeys.length;s++){
    var sec = secKeys[s];
    var items = secs[sec];
    if(secKeys.length > 1){
      var isShared = sec === "Shared";
      var cls = isShared ? "sub-shared" : ("sub-title" + (s===0?" first":""));
      html += '<div class="' + cls + '">' + sec + '</div>';
    }
    html += '<div class="sec">';
    for(var i=0;i<items.length;i++){
      var item = items[i];
      var id = "cb_" + blockKey.replace(/ /g,"_") + "_" + s + "_" + i;
      var key = blockKey + "||" + sec + "||" + item.l;
      var chk = checked[key] ? "checked" : "";
      var ttText = TT[item.l] ? TT[item.l] : "";
      var ttHtml = ttText ? '<div class="tooltip">' + ttText + '</div>' : "";
      html += '<div class="row" id="row_' + id + '">';
      html += '<label for="' + id + '"><input type="checkbox" id="' + id + '" ' + chk + '>' + item.l + '</label>';
      html += '<span class="code" title="' + item.c + '">' + item.c + '</span>';
      html += ttHtml + '</div>';
      if(item.h){
        html += '<div class="hint" id="hint_' + id + '"' + (checked[key]?' style="display:block"':'') + '>' + item.h + '</div>';
      }
    }
    html += '</div>';
  }
  container.innerHTML = html;
  for(var s=0;s<secKeys.length;s++){
    var sec = secKeys[s];
    var items = secs[sec];
    for(var i=0;i<items.length;i++){
      (function(sec, item, s, i){
        var id = "cb_" + blockKey.replace(/ /g,"_") + "_" + s + "_" + i;
        var key = blockKey + "||" + sec + "||" + item.l;
        var row = document.getElementById("row_" + id);
        var cb = document.getElementById(id);
        if(row) row.addEventListener("click", function(e){
          if(e.target.tagName === "INPUT") return;
          doToggle(key, id, cb);
        });
        if(cb) cb.addEventListener("click", function(e){
          e.stopPropagation();
          doToggle(key, id, cb);
        });
      })(sec, items[i], s, i);
    }
  }
}

function toggleBlock(k){
  openBlock = (openBlock === k) ? null : k;
  buildAccordion();
}

function doToggle(key, id, cb){
  if(checked[key]){ delete checked[key]; if(cb) cb.checked = false; }
  else { checked[key] = true; if(cb) cb.checked = true; }
  var hint = document.getElementById("hint_" + id);
  if(hint) hint.style.display = checked[key] ? "block" : "none";
  updateStatus();
}

function updateStatus(){
  var keys = Object.keys(checked);
  var n = keys.length;
  if(n === 0){
    document.getElementById("status").innerHTML = "No attributes selected";
  } else {
    var names = keys.map(function(k){ return k.split("||")[2]; }).join(", ");
    document.getElementById("status").innerHTML = '<span style="color:#2e7d32;font-weight:500">' + n + ' attribute' + (n>1?'s':'') + ' selected</span>: ' + names;
  }
}

buildAccordion();
</script>
</body>
</html>
