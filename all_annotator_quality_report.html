<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Weekly Annotation Quality Feedback — All Annotators</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --ink:#1a1a1a;--ink2:#4a4a4a;--ink3:#888;--ink4:#aaa;
  --border:#e0ddd8;--bg:#faf9f7;--card:#fff;
  --red:#c0392b;--redl:#fdf0ee;
  --amber:#b45309;--ambl:#fef9ee;
  --green:#166534;--grnl:#f0fdf4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6}
code{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,.07);padding:1px 5px;border-radius:3px;font-size:11px}

/* ── TOP BAR ── */
.topbar{background:var(--ink);padding:11px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:13px;font-weight:600;color:#fff}
.topbar-meta{font-size:11px;color:rgba(255,255,255,.4)}
.period-badge{background:rgba(255,255,255,.1);border-radius:100px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,.7)}

/* ── ANNOTATOR TABS ── */
.ann-tabs-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;white-space:nowrap}
.ann-tabs{display:inline-flex;gap:2px;padding:8px 0 0}
.at{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;color:var(--ink3);white-space:nowrap;position:relative;bottom:-1px}
.at:hover{color:var(--ink2);background:var(--bg)}
.at.active{background:var(--card);color:var(--ink);font-weight:500;border-color:var(--border);border-bottom-color:var(--card)}
.at .emr-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ── PAGE ── */
.page{max-width:820px;margin:0 auto;padding:28px 20px}
.ann-section{display:none}.ann-section.active{display:block}

/* ── REPORT CARD ── */
.rcard{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:0}

/* HEADER */
.rhdr{background:var(--ink);color:#fff;padding:24px 28px 20px}
.rhdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.rtype{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:4px}
.rhdr h2{font-size:19px;font-weight:600;color:#fff}
.rhdr-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:6px 14px;text-align:right;flex-shrink:0}
.rhdr-badge strong{display:block;font-size:20px;color:#fff;font-weight:600;line-height:1}
.rhdr-badge span{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px;display:block}
.rhdr-meta{display:flex;gap:20px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.12);padding-top:10px;font-size:11px;color:rgba(255,255,255,.5)}
.rhdr-meta b{color:rgba(255,255,255,.85);font-weight:500}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.kpi{padding:14px 18px;border-right:1px solid var(--border)}
.kpi:last-child{border-right:none}
.kl{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.kv{font-size:24px;font-weight:600;line-height:1}
.ks{font-size:11px;color:var(--ink3);margin-top:3px}
.kv.amber{color:var(--amber)}.kv.red{color:var(--red)}.kv.green{color:var(--green)}
.vsbar{position:relative;width:72px;height:5px;background:#eee;border-radius:3px;margin-top:6px;display:inline-block}
.vsbar-mid{position:absolute;left:50%;top:0;width:1px;height:100%;background:#bbb}
.vsbar-fill{position:absolute;height:100%;border-radius:3px}
.vs-lbl{font-size:10px;color:var(--ink3);margin-left:6px;vertical-align:middle}

/* SECTION */
.sec{padding:22px 28px;border-bottom:1px solid var(--border)}
.sec:last-child{border-bottom:none}
.snum{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.sec h3{font-size:14px;font-weight:600;margin-bottom:12px}

/* SUMMARY */
.slist{list-style:none;margin-bottom:14px}
.slist li{padding:5px 0 5px 12px;border-left:2px solid var(--border);margin-bottom:3px;font-size:13px;color:var(--ink2)}
.slist li b{color:var(--ink);font-weight:500}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.act{border-radius:6px;padding:11px 13px;border:1px solid}
.act.miss{background:var(--redl);border-color:#fcc}
.act.ext{background:var(--ambl);border-color:#fde68a}
.act-pct{font-size:24px;font-weight:600;line-height:1;margin-bottom:2px}
.miss .act-pct{color:var(--red)}.ext .act-pct{color:var(--amber)}
.act-lbl{font-size:11px;font-weight:500;color:var(--ink2);line-height:1.3}
.act-sub{font-size:10px;color:var(--ink3);margin-top:2px}
.takeaway{background:#f8f6f0;border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:11px 14px;font-size:12px;line-height:1.65}
.takeaway b{font-weight:600}

/* ATTR TABLE */
.atable{width:100%;border-collapse:collapse;font-size:12px}
.atable thead tr{border-bottom:1.5px solid var(--ink)}
.atable th{padding:6px 9px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);text-align:left}
.atable th.r{text-align:right}
.atable td{padding:8px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.atable tr:last-child td{border-bottom:none}
.aname{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--ink)}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:500;white-space:nowrap}
.badge.miss{background:var(--redl);color:var(--red)}
.badge.ext{background:var(--ambl);color:var(--amber)}
.badge.mix{background:#f1f5f9;color:#475569}
.dbar-wrap{display:flex;flex-direction:column;gap:3px}
.dbar-row{display:flex;align-items:center;gap:5px}
.dbar-outer{width:52px;height:4px;background:#eee;border-radius:2px;overflow:hidden;flex-shrink:0}
.dbar-fill{height:100%;border-radius:2px}
.dbar-pct{font-size:11px;font-weight:600;min-width:26px;text-align:right}
.dbar-lbl{font-size:9px;color:var(--ink3);min-width:52px}
.nc{font-size:11px;color:var(--ink3);max-width:180px;line-height:1.4}
.group-block{margin-bottom:18px}
.group-block:last-child{margin-bottom:0}
.group-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.group-line{flex:1;height:1px;background:var(--border)}
.group-desc{font-size:12px;color:var(--ink3);margin-bottom:10px}

/* CASE CARDS */
.ccard{border:1px solid var(--border);border-radius:6px;margin-bottom:9px;overflow:hidden}
.ccard:last-child{margin-bottom:0}
.chdr{display:flex;align-items:center;gap:8px;padding:8px 13px;background:#fafafa;border-bottom:1px solid var(--border)}
.cimgid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink3)}
.cbody{padding:11px 13px}
.crow{display:flex;gap:12px;margin-bottom:6px;font-size:12px}
.crow:last-child{margin-bottom:0}
.ck{color:var(--ink3);min-width:88px;flex-shrink:0;font-size:11px}
.lblset{display:flex;flex-wrap:wrap;gap:4px}
.lbl{display:inline-block;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;background:#f0ede8;color:var(--ink2)}
.lbl.add{background:#dcfce7;color:#166534}
.lbl.rem{background:#fee2e2;color:#991b1b}

/* FOOTER */
.disc{font-size:11px;color:var(--ink3);line-height:1.6;border:1px dashed var(--border);border-radius:6px;padding:11px 13px;background:#fafafa}
</style>
</head>

const ANNS = Object.keys(DATA).sort((a,b)=>DATA[a].emr-DATA[b].emr); // sort low→high EMR

function emrColor(v){ return v>=55?'green':v>=45?'amber':'red'; }

function attrRows(items, maxPCorr) {
  if(!items.length) return '<tr><td colspan="5" style="padding:10px 9px;color:var(--ink3);font-style:italic;font-size:12px">No corrections in this category</td></tr>';
  return items.map(a => {
    const hm = 'missed' in a.types || 'confusion' in a.types;
    const he = 'extra' in a.types;
    const grp = hm && he ? 'mix' : hm ? 'miss' : 'ext';
    const barCol = grp==='miss'?'#c0392b':grp==='ext'?'#b45309':'#5b21b6';
    return `<tr>
      <td><span class="aname">${a.attr}</span></td>
      <td><span class="badge ${grp}">${grp==='miss'?'missed':grp==='ext'?'extra':'mixed'}</span></td>
      <td>
        <div class="dbar-wrap">
          <div class="dbar-row">
            <div class="dbar-outer"><div class="dbar-fill" style="width:${a.pCorr}%;background:${barCol}"></div></div>
            <span class="dbar-pct" style="color:${barCol}">${a.pCorr}%</span>
            <span class="dbar-lbl">of corrections</span>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function caseCards(examples) {
  if(!examples.length) return '<p style="color:var(--ink3);font-size:12px;font-style:italic">No case examples available.</p>';
  return examples.map(ex => {
    const isMissed   = ex.type === 'missed';
    const isExtra    = ex.type === 'extra';
    const isConfusion= ex.type === 'confusion';

    const typeLabel = isMissed ? 'Missed label' : isExtra ? 'Extra label' : 'Label confusion';
    const badgeCls  = isMissed ? 'miss' : isExtra ? 'ext' : 'mix';

    // Image link placeholder — replace IMAGE_BASE_URL with actual Archer URL when known
    const imageUrl = `IMAGE_BASE_URL/${ex.img}`;
    const imgLink  = `<a href="${imageUrl}" target="_blank" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#3266ad;text-decoration:none" title="Open in Archer">
      #${ex.img} ↗
    </a>`;

    let rows = '';

    if(isMissed) {
      // Missed: image id + link, Added by reviewer only
      rows = ex.missed?.length
        ? `<div class="crow"><span class="ck">Added by reviewer</span><div class="lblset">${ex.missed.map(l=>`<span class="lbl add">+ ${l}</span>`).join('')}</div></div>`
        : '';
    } else if(isExtra) {
      // Extra: image id + link, Removed by reviewer only
      rows = ex.extra?.length
        ? `<div class="crow"><span class="ck">Removed by reviewer</span><div class="lblset">${ex.extra.map(l=>`<span class="lbl rem">− ${l}</span>`).join('')}</div></div>`
        : '';
    } else if(isConfusion) {
      // Confusion: image id + link, Added + Removed
      const addedRow   = ex.missed?.length
        ? `<div class="crow"><span class="ck">Added by reviewer</span><div class="lblset">${ex.missed.map(l=>`<span class="lbl add">+ ${l}</span>`).join('')}</div></div>`
        : '';
      const removedRow = ex.extra?.length
        ? `<div class="crow"><span class="ck">Removed by reviewer</span><div class="lblset">${ex.extra.map(l=>`<span class="lbl rem">− ${l}</span>`).join('')}</div></div>`
        : '';
      rows = addedRow + removedRow;
    }

    return `<div class="ccard">
      <div class="chdr">
        <span class="badge ${badgeCls}">${typeLabel}</span>
        ${imgLink}
      </div>
      <div class="cbody">${rows}</div>
    </div>`;
  }).join('');
}

      <div style="display:flex;gap:14px;margin-top:8px;font-size:10px;color:var(--ink3)">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#3266ad;vertical-align:middle;margin-right:3px"></span>Full day (≥1 000)</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#7aa7d4;vertical-align:middle;margin-right:3px"></span>Partial day</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ddd;vertical-align:middle;margin-right:3px"></span>Weekend / no data</span>
      </div>
    </div>

    <div class="sec">
      <div class="snum">Section 1</div>
      <h3>Summary</h3>
      <p style="color:var(--ink2);margin-bottom:11px">Most frequent corrections in this period:</p>
      <ul class="slist">
        ${d.top3.map(a=>`<li><b>${a}</b> — one of the most corrected attributes in your reviewed sample</li>`).join('')}
      </ul>
      <div class="takeaway">
        <b>Key pattern:</b>
        ${d.missed_pct >= 70
          ? `Under-labeling is the main issue — ${d.missed_pct}% of all corrections were labels added by the reviewer. Focus on checking for lawn condition attributes and bad-picture label types before submitting.`
          : d.extra_pct >= 40
          ? `Over-labeling is the main issue — ${d.extra_pct}% of corrections were labels removed by the reviewer. Review thresholds for the attributes listed below.`
          : `Corrections are split between missed (${d.missed_pct}%) and extra (${d.extra_pct}%) labels — check both threshold calibration and coverage.`}
        ${d.confusion_pct >= 10 ? ` Label confusion accounts for ${d.confusion_pct}% of corrections — pay particular attention to bad_picture label variants.` : ''}
      </div>
    </div>

    <div class="sec">
      <div class="snum">Section 2</div>
      <h3>Corrected attributes — grouped by issue type</h3>
      ${grpBlocks.map(g => `
        <div class="group-block">
          <div class="group-header">
            <span class="badge ${g.key==='miss'?'miss':g.key==='ext'?'ext':'mix'}">${g.title}</span>
            <div class="group-line"></div>
          </div>
          <p class="group-desc">${g.desc}</p>
          <table class="atable">
            <thead><tr><th>Attribute</th><th>Type</th><th>Frequency</th></tr></thead>
            <tbody>${attrRows(d.groups[g.key], maxPCorr)}</tbody>
          </table>
        </div>`).join('')}
    </div>

    <div class="sec">
      <div class="snum">Section 3</div>
      <h3>Example corrections from your reviewed images</h3>
      <p style="color:var(--ink2);font-size:12px;margin-bottom:12px">Specific images where corrections were made. Green labels were added by the reviewer; red labels were removed.</p>
      ${caseCards(d.examples)}
    </div>

    <div class="sec">
      <div class="snum">Section 4</div>
      <h3>Disclaimer</h3>
      <div class="disc">
        This report is based on a reviewed sample only — not all submitted images are included. The rates shown reflect the proportion of corrections within the reviewed subset and should be interpreted as directional signals, not absolute performance scores. No absolute counts are shown. If you have questions about a specific case, please contact your team lead.
      </div>
    </div>
  </div>`;
}

// Build tabs and sections
const tabsEl = document.getElementById('ann-tabs');
const sectsEl = document.getElementById('ann-sections');

ANNS.forEach((name, i) => {
  const d = DATA[name];
  const col = d.emr>=55?'#1D9E75':d.emr>=45?'#b45309':'#c0392b';

  // Tab
  const btn = document.createElement('button');
  btn.className = 'at' + (i===0?' active':'');
  btn.innerHTML = `<span class="emr-dot" style="background:${col}"></span>${name} <span style="font-size:10px;color:var(--ink3)">${d.emr}%</span>`;
  btn.onclick = () => {
    document.querySelectorAll('.at').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.ann-section').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-'+name).classList.add('active');
  };
  tabsEl.appendChild(btn);

  // Section
  const div = document.createElement('div');
  div.id = 'sec-'+name;
  div.className = 'ann-section' + (i===0?' active':'');
  div.innerHTML = buildSection(name);
  sectsEl.appendChild(div);
});
</script>
</body>
</html>
