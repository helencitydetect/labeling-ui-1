<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Detect — New Labeling UI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f5;padding:12px;font-size:14px}
.app{display:grid;grid-template-columns:150px 1fr;border:0.5px solid #ccc;border-radius:12px;overflow:hidden;background:#fff;max-width:100%}
.sidebar{background:#f5f5f5;border-right:0.5px solid #ccc}
.nav-item{padding:11px 16px;font-size:13px;color:#555;cursor:pointer;border-bottom:0.5px solid #e0e0e0}
.nav-item:hover:not(.active){background:#fff}
.nav-item.active{background:#2e7d32;color:#fff;font-weight:500}
.main{padding:16px 20px;min-height:460px;overflow-y:auto}
.sec{margin-bottom:20px}
.sec-title{font-size:16px;font-weight:500;margin-bottom:10px;color:#111}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:4px;font-size:13px;cursor:pointer;user-select:none}
.row:nth-child(even){background:#f9f9f9}
.row:hover{background:#e8f5e9}
.row label{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;color:#111}
.row input{accent-color:#2e7d32;width:15px;height:15px;cursor:pointer;flex-shrink:0}
.code{font-family:monospace;font-size:11px;text-decoration:underline;color:#888;white-space:nowrap}
.hint{font-size:11px;color:#aaa;font-style:italic;padding:2px 10px 5px 33px;display:none}
.statusbar{padding:9px 16px;font-size:12px;color:#666;border-top:0.5px solid #ddd;background:#f5f5f5}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="nav"></div>
  <div style="display:flex;flex-direction:column;min-width:0">
    <div class="main" id="main"></div>
    <div class="statusbar" id="status">No attributes selected</div>
  </div>
</div>
<script>
const B = {
  General:{
    "Lot type":[
      {l:"Abandoned",c:"LTA"},
      {l:"Construction",c:"LTCON"},
      {l:"Multifamily",c:"LTM"},
      {l:"Not residential",c:"LTNR"},
      {l:"Vacant",c:"LTV"}
    ],
    "Bad picture":[
      {l:"Bad angle",c:"BPA"},
      {l:"Blocked",c:"BPB"},
      {l:"Cloudy",c:"BPC"},
      {l:"Wrong parcel",c:"BPWP"}
    ]
  },
  Ground:{
    "Lawn":[
      {l:"Lawn Branches",c:"LABR",h:"was: Branches (LABR)"},
      {l:"Lawn Dead Patch",c:"LADP",h:"was: Dead patch (LADP)"},
      {l:"Litter / Debris",c:"LALD",h:"was: Debris (LADE) + Litter (LALI) — merged"},
      {l:"Leaves",c:"LALE",h:"was: Leaves (LALE)"},
      {l:"Overgrown Lawn",c:"OLA",h:"was: Overgrown weeds (LAO)"},
      {l:"Lawn Vehicle",c:"LAV",h:"was: Vehicle (LAV)"}
    ]
  },
  Pavement:{
    "Sidewalk":[
      {l:"Cracked",c:"SIC",h:"was: Cracked (SIC)"},
      {l:"Litter / Debris",c:"SILD",h:"was: Debris (SID) + Litter (SILI) — merged"},
      {l:"Leaves",c:"SILE",h:"was: Leaves (SILE)"},
      {l:"Overgrown Pavement",c:"SIOP",h:"was: Overgrown (SIO)"}
    ],
    "Driveway":[
      {l:"Cracked",c:"DRC",h:"was: Cracked (DRC)"},
      {l:"Litter / Debris",c:"DRLD",h:"was: Debris (DRD) + Litter (DRLI) — merged"},
      {l:"Leaves",c:"DRLE",h:"was: Leaves (DRLE)"},
      {l:"Overgrown Pavement",c:"DROP",h:"was: Overgrown (DRO)"}
    ]
  },
  Structures:{
    "Retaining wall":[
      {l:"Retaining Wall Damage",c:"REDA",h:"was: Structural (RES)"},
      {l:"Yard Structure Overgrown",c:"REYSO",h:"was: Overgrown (REO)"}
    ],
    "Fence":[
      {l:"Fence Damage",c:"FEDA",h:"was: Structural (FES)"},
      {l:"Fence Paint",c:"FEP",h:"was: Paint rust (FEP)"},
      {l:"Yard Structure Overgrown",c:"FEYSO",h:"was: Overgrown (FEO)"}
    ],
    "Garage":[
      {l:"Garage Damage",c:"GADA",h:"was: Structural (GAS)"},
      {l:"Structure Paint",c:"GASP",h:"was: Paint rust (GAP)"},
      {l:"Overgrown Structures",c:"GAOS",h:"was: Overgrown (GAO)"}
    ]
  },
  Porch:{
    "Porch":[
      {l:"Porch Debris",c:"POD",h:"was: Debris (POD)"},
      {l:"Porch Damage",c:"PODA",h:"was: Structural (POST) + Screen (POSC) — merged"},
      {l:"Structure Paint",c:"POSP",h:"was: Paint rust (POPA)"},
      {l:"Overgrown Structures",c:"POOS",h:"was: Overgrown (POO)"}
    ],
    "Awning":[
      {l:"Awning Damage",c:"AWDA",h:"was: Structural (AWS)"},
      {l:"Structure Paint",c:"AWSP",h:"was: Paint rust (AWP)"}
    ],
    "Column":[
      {l:"Column Damage",c:"COLDA",h:"was: Structural (COLS)"},
      {l:"Structure Paint",c:"COLSP",h:"was: Paint rust (COLP)"}
    ]
  },
  Stairs:{
    "Stairs":[
      {l:"Stair Damage",c:"STDA",h:"was: Structural (STS)"},
      {l:"Leaves",c:"STLE",h:"was: Leaves (STLE)"},
      {l:"Overgrown Pavement",c:"STOP",h:"was: Overgrown (STO)"}
    ],
    "Railing":[
      {l:"Stair Damage",c:"RADA",h:"was: Structural (RAS)"},
      {l:"Structure Paint",c:"RASP",h:"was: Paint rust (RAP)"},
      {l:"Overgrown Structures",c:"RAOS",h:"was: Overgrown (RAO)"}
    ]
  },
  Walls:{
    "Wall":[
      {l:"Wall Structural Damage",c:"WASDA",h:"was: Structural (WAS)"},
      {l:"Structure Paint",c:"WASP",h:"was: Paint rust (WAP)"},
      {l:"Overgrown Structures",c:"WAOS",h:"was: Overgrown (WAO)"}
    ],
    "Foundation":[
      {l:"Foundation Damage",c:"FODA",h:"was: Structural (FOS)"},
      {l:"Structure Paint",c:"FOSP",h:"was: Paint rust (FOP)"}
    ],
    "Vent":[
      {l:"Structure Paint",c:"VESP",h:"was: Paint rust (VEP)"}
    ]
  },
  Fenestration:{
    "Door":[
      {l:"Broken Door",c:"DOB",h:"was: Broken (DOB) + Missing (DOMI) — merged"},
      {l:"Door Plywood",c:"DOPL",h:"was: Plywood (DOPL)"},
      {l:"Structure Paint",c:"DOSP",h:"was: Paint rust (DOPA)"}
    ],
    "Shutter":[
      {l:"Structure Paint",c:"SHSP",h:"was: Paint rust (SHP)"}
    ],
    "Window":[
      {l:"Broken Window",c:"WIB",h:"was: Broken (WIB) + Missing (WIMI) — merged"},
      {l:"Window Plywood",c:"WIPL",h:"was: Plywood (WIPL)"},
      {l:"Structure Paint",c:"WISP",h:"was: Paint rust (WIPA)"}
    ]
  },
  Roof:{
    "Roof":[
      {l:"Roof Leaves",c:"ROL",h:"was: Leaves (ROL)"},
      {l:"Roof Damage",c:"RODA",h:"was: Structural (ROS)"},
      {l:"Roof Tarp",c:"ROT",h:"was: Tarp (ROT)"},
      {l:"Overgrown Structures",c:"ROOS",h:"was: Overgrown (ROO)"}
    ],
    "Chimney":[
      {l:"Chimney Damage",c:"CHDA",h:"was: Structural (CHS)"},
      {l:"Structure Paint",c:"CHSP",h:"was: Paint (CHP)"}
    ],
    "Soffit":[
      {l:"Fascia Damage",c:"SOFDA",h:"was: Structural (SOS)"},
      {l:"Structure Paint",c:"SOSP",h:"was: Paint rust (SOP)"}
    ],
    "Fascia":[
      {l:"Fascia Damage",c:"FADA",h:"was: Structural (FAS)"},
      {l:"Structure Paint",c:"FASP",h:"was: Paint (FAP)"}
    ],
    "Gutter":[
      {l:"Fascia Damage",c:"GUFDA",h:"was: Structural (GUS)"},
      {l:"Overgrown Structures",c:"GUOS",h:"was: Overgrown (GUO)"}
    ]
  }
};

let curBlock="General";
const checked=new Set();

function buildNav(){
  document.getElementById('nav').innerHTML=Object.keys(B).map(k=>
    `<div class="nav-item${k===curBlock?' active':''}" onclick="setBlock('${k}')">${k}</div>`
  ).join('');
}

function buildMain(){
  const secs=B[curBlock];
  document.getElementById('main').innerHTML=Object.entries(secs).map(([sec,items])=>
    `<div class="sec"><div class="sec-title">${sec}</div>`+
    items.map((item,i)=>{
      const id=`cb_${sec.replace(/\W/g,'_')}_${i}`;
      const key=curBlock+'|'+sec+'|'+item.l;
      const chk=checked.has(key)?'checked':'';
      return `<div class="row" onclick="toggle('${key}','${id}')">
        <label for="${id}"><input type="checkbox" id="${id}" ${chk} onclick="event.stopPropagation();toggle('${key}','${id}')">${item.l}</label>
        <span class="code">${item.c}</span>
      </div>`+(item.h?`<div class="hint" id="hint_${id}" style="${chk?'display:block':''}">${item.h}</div>`:'');
    }).join('')+`</div>`
  ).join('');
  updateStatus();
}

function toggle(key,id){
  const cb=document.getElementById(id);
  if(checked.has(key)){checked.delete(key);if(cb)cb.checked=false;}
  else{checked.add(key);if(cb)cb.checked=true;}
  const hint=document.getElementById('hint_'+id);
  if(hint)hint.style.display=checked.has(key)?'block':'none';
  updateStatus();
}

function updateStatus(){
  const n=checked.size;
  document.getElementById('status').innerHTML=n===0
    ?'No attributes selected'
    :`<span style="color:#2e7d32;font-weight:500">${n} attribute${n>1?'s':''} selected</span>: ${[...checked].map(k=>k.split('|')[2]).join(', ')}`;
}

function setBlock(b){curBlock=b;buildNav();buildMain();}
buildNav();
buildMain();
</script>
</body>
</html>
