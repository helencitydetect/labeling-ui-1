<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Detect - House Zone Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f5;padding:12px;font-size:14px}
.wrap{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start}
svg .zone{cursor:pointer;transition:opacity .15s}
svg .zone:hover{opacity:.75}
.panel{background:#fff;border-radius:10px;border:0.5px solid #ddd;padding:14px;min-height:220px}
.panel-title{font-size:13px;font-weight:500;color:#111;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid #eee}
.panel-hint{font-size:12px;color:#aaa;font-style:italic}
.attr-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;font-size:12px;margin-bottom:3px}
.attr-item:nth-child(even){background:#f9f9f9}
.attr-name{color:#111}
.attr-code{font-family:monospace;font-size:10px;color:#aaa}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:11px;color:#666}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.note{font-size:11px;color:#aaa;margin-top:8px;font-style:italic}
</style>
</head>
<body>
<div class="wrap">
<div>
<svg viewBox="0 0 400 380" width="100%" xmlns="http://www.w3.org/2000/svg">

<g class="zone" onclick="show('roof')">
  <polygon points="200,20 370,130 30,130" fill="#FBEAF0" stroke="#993556" stroke-width="1.5"/>
  <text x="200" y="95" text-anchor="middle" font-size="12" font-weight="500" fill="#72243E">Roof</text>
</g>

<g class="zone" onclick="show('roof')">
  <rect x="270" y="30" width="30" height="55" fill="#F4C0D1" stroke="#993556" stroke-width="1"/>
  <text x="285" y="58" text-anchor="middle" font-size="9" fill="#72243E">Chimney</text>
</g>

<g class="zone" onclick="show('walls')">
  <rect x="30" y="130" width="340" height="150" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="50" y="155" font-size="11" font-weight="500" fill="#0C447C">Walls</text>
</g>

<g class="zone" onclick="show('fenestration')">
  <rect x="55" y="155" width="70" height="55" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <line x1="90" y1="155" x2="90" y2="210" stroke="#185FA5" stroke-width="0.5"/>
  <line x1="55" y1="182" x2="125" y2="182" stroke="#185FA5" stroke-width="0.5"/>
  <text x="90" y="225" text-anchor="middle" font-size="9" fill="#0C447C">Window</text>
</g>

<g class="zone" onclick="show('fenestration')">
  <rect x="275" y="155" width="70" height="55" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <line x1="310" y1="155" x2="310" y2="210" stroke="#185FA5" stroke-width="0.5"/>
  <line x1="275" y1="182" x2="345" y2="182" stroke="#185FA5" stroke-width="0.5"/>
  <text x="310" y="225" text-anchor="middle" font-size="9" fill="#0C447C">Window</text>
</g>

<g class="zone" onclick="show('fenestration')">
  <rect x="160" y="185" width="55" height="95" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <circle cx="207" cy="232" r="4" fill="#185FA5"/>
  <text x="187" y="178" text-anchor="middle" font-size="9" fill="#0C447C">Door</text>
</g>

<g class="zone" onclick="show('porch')">
  <rect x="110" y="280" width="180" height="30" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <rect x="115" y="260" width="15" height="50" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <rect x="270" y="260" width="15" height="50" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="200" y="299" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489">Porch</text>
</g>

<g class="zone" onclick="show('porch')">
  <rect x="30" y="190" width="85" height="90" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <line x1="30" y1="215" x2="115" y2="215" stroke="#534AB7" stroke-width="0.5"/>
  <line x1="30" y1="240" x2="115" y2="240" stroke="#534AB7" stroke-width="0.5"/>
  <line x1="72" y1="190" x2="72" y2="280" stroke="#534AB7" stroke-width="0.5"/>
  <text x="72" y="175" text-anchor="middle" font-size="10" font-weight="500" fill="#3C3489">Garage</text>
</g>

<g class="zone" onclick="show('walls')">
  <rect x="30" y="310" width="340" height="18" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
  <text x="200" y="323" text-anchor="middle" font-size="9" fill="#444441">Foundation</text>
</g>

<g class="zone" onclick="show('structures')">
  <rect x="5" y="295" width="20" height="60" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <rect x="375" y="295" width="20" height="60" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <line x1="5" y1="310" x2="25" y2="310" stroke="#A32D2D" stroke-width="1"/>
  <line x1="375" y1="310" x2="395" y2="310" stroke="#A32D2D" stroke-width="1"/>
  <text x="15" y="370" text-anchor="middle" font-size="8" fill="#791F1F">Fence</text>
  <text x="385" y="370" text-anchor="middle" font-size="8" fill="#791F1F">Fence</text>
</g>

<g class="zone" onclick="show('structures')">
  <rect x="5" y="295" width="390" height="12" rx="2" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="340" y="305" text-anchor="end" font-size="8" fill="#791F1F">Retaining wall</text>
</g>

<g class="zone" onclick="show('grounds')">
  <rect x="5" y="328" width="390" height="42" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="200" y="353" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A">Lawn / Pavement / Driveway</text>
</g>

</svg>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#FBEAF0;border:1px solid #993556"></div> Roof</div>
  <div class="leg"><div class="leg-dot" style="background:#E6F1FB;border:1px solid #185FA5"></div> Walls</div>
  <div class="leg"><div class="leg-dot" style="background:#B5D4F4;border:1px solid #185FA5"></div> Fenestration</div>
  <div class="leg"><div class="leg-dot" style="background:#EEEDFE;border:1px solid #534AB7"></div> Porch</div>
  <div class="leg"><div class="leg-dot" style="background:#FCEBEB;border:1px solid #A32D2D"></div> Structures</div>
  <div class="leg"><div class="leg-dot" style="background:#EAF3DE;border:1px solid #3B6D11"></div> Grounds</div>
</div>
<p class="note">Click any zone to see applicable attributes</p>
</div>

<div class="panel" id="panel">
  <div class="panel-title">Click a zone to see attributes</div>
  <div class="panel-hint">Hover over any part of the house diagram to explore labeling zones</div>
</div>
</div>

<script>
var zones = {
  roof:{title:"Roof zone",attrs:[
    {n:"Roof Leaves",c:"ROL"},{n:"Chimney Damage",c:"CHDA"},{n:"Roof Damage",c:"RODA"},
    {n:"Roof Tarp",c:"ROT"},{n:"Fascia Damage",c:"FADA"},{n:"Overgrown Structures",c:"GAOS"},
    {n:"Structure Paint",c:"GASP"}
  ]},
  walls:{title:"Walls & Foundation",attrs:[
    {n:"Wall Structural Damage",c:"WASDA"},{n:"Foundation Damage",c:"FODA"},
    {n:"Overgrown Structures",c:"GAOS"},{n:"Structure Paint",c:"GASP"}
  ]},
  fenestration:{title:"Doors & Windows",attrs:[
    {n:"Broken Window",c:"WIB"},{n:"Window Plywood",c:"WIPL"},
    {n:"Broken Door",c:"DOB"},{n:"Door Plywood",c:"DOPL"},
    {n:"Structure Paint",c:"GASP"}
  ]},
  porch:{title:"Porch & Garage",attrs:[
    {n:"Porch Debris",c:"POD"},{n:"Porch Damage",c:"PODA"},{n:"Awning Damage",c:"AWDA"},
    {n:"Column Damage",c:"COLDA"},{n:"Garage Damage",c:"GADA"},
    {n:"Overgrown Structures",c:"GAOS"},{n:"Structure Paint",c:"GASP"}
  ]},
  structures:{title:"Fence & Retaining Wall",attrs:[
    {n:"Fence Paint",c:"FEP"},{n:"Fence Damage",c:"FEDA"},
    {n:"Yard Structure Overgrown",c:"REYSO"},{n:"Retaining Wall Damage",c:"REDA"},
    {n:"Overgrown Structures",c:"GAOS"}
  ]},
  grounds:{title:"Lawn & Pavement",attrs:[
    {n:"Lawn Branches",c:"LABR"},{n:"Lawn Dead Patch",c:"LADP"},{n:"Overgrown Lawn",c:"OLA"},
    {n:"Lawn Vehicle",c:"LAV"},{n:"Leaves",c:"LALE"},{n:"Litter / Debris",c:"LALD"},
    {n:"Cracked Driveway",c:"DRC"},{n:"Cracked Sidewalk",c:"SIC"},{n:"Overgrown Pavement",c:"SIOP"}
  ]}
};

function show(key){
  var z=zones[key];
  var html='<div class="panel-title">'+z.title+'</div>';
  for(var i=0;i<z.attrs.length;i++){
    html+='<div class="attr-item"><span class="attr-name">'+z.attrs[i].n+'</span><span class="attr-code">'+z.attrs[i].c+'</span></div>';
  }
  document.getElementById("panel").innerHTML=html;
}
</script>
</body>
</html>
